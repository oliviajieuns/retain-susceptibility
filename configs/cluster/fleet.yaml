# Node -> queue assignments for the H100 fleet.
#
# launch_node.sh with no argument reads this file and serves the queue
# assigned to the current hostname; passing a different queue explicitly is
# refused unless FORCE_QUEUE=1. fleet_status flags any claimed unit whose
# host is serving a queue it is not assigned to.
#
# Queue paths are relative to the repository root.
assignments:
  run261224-ul2: runs/cluster_queue/wave1            # 7B calibration
  run261216-unlearning: runs/cluster_queue/wave1_14b # 14B channel-matrix
  # 2026-07-23 (freeze landed): ul3 serves the 7B audit + alpha wave.
  run261225-ul3: runs/cluster_queue/wave2            # 7B audit + alpha
  # Table 1/2 expansion queues (enqueue_table12.sh). Fill in the hostname of
  # each newly grabbed 8-GPU node before launch_node.sh will serve the queue;
  # an unassigned node can serve one explicitly with FORCE_QUEUE=1.
  # <new-node-1>: runs/cluster_queue/wave_wmdp       # WMDP-bio/MMLU W1
  # <new-node-2>: runs/cluster_queue/wave_llama      # Llama-3.1-8B W1
  # <new-node-3>: runs/cluster_queue/wave_rwku       # RWKU audit (1 GPU enough)
